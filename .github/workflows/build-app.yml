# Build executable app and upload to GitHub release (under Assets).
# This Action is purposefully kept manual as to not potentially create assets by mistake.
name: Build app

on:
  workflow_dispatch:
    inputs:
      mac_os:
        description: 'MacOs'
        required: true
        default: 'false'
        type: choice
        options:
          - 'true'
          - 'false'
      windows:
        description: 'Windows'
        required: true
        default: 'false'
        type: choice
        options:
          - 'true'
          - 'false'
      linux:
        description: 'Linux'
        required: true
        default: 'false'
        type: choice
        options:
          - 'true'
          - 'false'

permissions:
  contents: write
  actions: read

jobs:
  mac_os:
    runs-on: macos-latest
    if: github.event.inputs.mac_os == 'true'
    env:
      UV_SYSTEM_PYTHON: '1'

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Install requirements
        run: |
          uv pip install typer-invoke
          inv pip install requirements-dev

      - name: Build app
        run: inv build.app

      - name: Upload to GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: inv build.upload

  windows:
    runs-on: windows-latest
    if: github.event.inputs.windows == 'true'
    env:
      UV_SYSTEM_PYTHON: '1'

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Install requirements
        run: |
          uv pip install typer-invoke
          inv pip install requirements-dev

      - name: Build app
        run: inv build.app

      - name: Upload to GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: inv build.upload

  linux:
    runs-on: ubuntu-latest
    if: github.event.inputs.linux == 'true'
    env:
      UV_SYSTEM_PYTHON: '1'

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Install libEGL
        # Implementation of the EGL (Embedded-Systems Graphics Library) API.
        # Linux only. No need to install on Windows or Mac.
        run: |
          sudo apt-get update -yqq
          sudo apt-get install -y libegl1-mesa

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Install requirements
        run: |
          uv pip install typer-invoke
          inv pip install requirements-dev

      - name: Build app
        run: inv build.app

      - name: Upload to GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: inv build.upload
